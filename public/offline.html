<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Hors connexion - Portail RH PNMLS</title>
    <link rel="icon" type="image/png" href="/images/logo-pnmls.png">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#0077B5">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', 'Roboto', -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(145deg, #f0f4f8 0%, #e2e8f0 50%, #dbeafe 100%);
            padding: 2rem;
        }
        .offline-container { text-align: center; max-width: 480px; }

        .offline-icon-wrap {
            width: 120px; height: 120px; border-radius: 50%;
            background: #fff; display: flex; align-items: center; justify-content: center;
            margin: 0 auto 1.5rem;
            box-shadow: 0 12px 40px rgba(0,119,181,.15);
            border: 3px solid rgba(0,119,181,.1);
            position: relative;
        }
        .offline-icon-wrap img {
            width: 70px; height: 70px; object-fit: contain;
            filter: grayscale(80%); opacity: .5;
        }
        .offline-icon-wrap::after {
            content: '';
            position: absolute; bottom: -4px; right: -4px;
            width: 36px; height: 36px; border-radius: 50%;
            background: #ef4444; border: 3px solid #f0f4f8;
            display: flex; align-items: center; justify-content: center;
        }
        .offline-icon-wrap::before {
            content: '!';
            position: absolute; bottom: 1px; right: 6px;
            color: #fff; font-weight: 900; font-size: .9rem; z-index: 1;
        }

        .wifi-bars {
            display: flex; align-items: flex-end; justify-content: center;
            gap: 5px; margin-bottom: 1.2rem; height: 40px;
        }
        .wifi-bars span {
            width: 8px; border-radius: 3px; background: #cbd5e1;
        }
        .wifi-bars span:nth-child(1) { height: 10px; animation: blink 2s infinite .0s; }
        .wifi-bars span:nth-child(2) { height: 18px; animation: blink 2s infinite .2s; }
        .wifi-bars span:nth-child(3) { height: 26px; animation: blink 2s infinite .4s; }
        .wifi-bars span:nth-child(4) { height: 34px; animation: blink 2s infinite .6s; }
        @keyframes blink {
            0%, 100% { opacity: .3; }
            50% { opacity: 1; background: #0077B5; }
        }

        .offline-title {
            font-size: 1.5rem; font-weight: 700; color: #1e293b; margin-bottom: .5rem;
        }
        .offline-message {
            font-size: .9rem; color: #64748b; line-height: 1.6; margin-bottom: 2rem;
        }

        .btn-retry {
            padding: .75rem 2rem; border: none; border-radius: 12px;
            font-size: .9rem; font-weight: 700; color: #fff;
            background: linear-gradient(135deg, #0077B5, #005a87);
            cursor: pointer; box-shadow: 0 4px 14px rgba(0,119,181,.25);
            text-decoration: none; display: inline-flex; align-items: center;
            gap: .5rem; transition: all .25s;
        }
        .btn-retry:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,119,181,.35);
        }
        .btn-retry svg {
            width: 16px; height: 16px; fill: currentColor;
        }

        .status-dot {
            display: inline-block; width: 8px; height: 8px; border-radius: 50%;
            margin-right: 6px; animation: pulse-dot 1.5s infinite;
        }
        .status-dot.offline { background: #ef4444; }
        .status-dot.online { background: #22c55e; }
        @keyframes pulse-dot {
            0%, 100% { opacity: 1; }
            50% { opacity: .4; }
        }
        .status-text {
            font-size: .78rem; color: #94a3b8; margin-top: 1.5rem;
        }

        .footer-logo {
            margin-top: 2rem; opacity: .3;
        }
        .footer-logo img { width: 30px; height: 30px; object-fit: contain; }
        .footer-logo span { font-size: .7rem; color: #94a3b8; margin-left: 6px; }
    </style>
</head>
<body>
    <div class="offline-container">
        <div class="wifi-bars">
            <span></span><span></span><span></span><span></span>
        </div>

        <div class="offline-icon-wrap">
            <img src="/images/logo-pnmls.png" alt="PNMLS">
        </div>

        <h1 class="offline-title">Pas de connexion Internet</h1>
        <p class="offline-message">
            Vous êtes actuellement hors ligne.<br>
            L'application se reconnectera automatiquement<br>
            dès que votre connexion sera rétablie.
        </p>

        <button class="btn-retry" onclick="window.location.reload()">
            <svg viewBox="0 0 24 24"><path d="M17.65 6.35A7.96 7.96 0 0012 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0112 18c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
            Réessayer
        </button>

        <p class="status-text" id="connectionStatus">
            <span class="status-dot offline"></span> Hors ligne — en attente de connexion...
        </p>

        <div class="footer-logo">
            <img src="/images/logo-pnmls.png" alt="">
            <span>&copy; 2026 PNMLS</span>
        </div>
    </div>

    <script>
    // Auto-reload when back online
    window.addEventListener('online', () => {
        document.getElementById('connectionStatus').innerHTML =
            '<span class="status-dot online"></span> Connexion rétablie ! Rechargement...';
        setTimeout(() => window.location.reload(), 1500);
    });
    </script>
</body>
</html>
