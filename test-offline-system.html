<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test - Système Pointage Offline</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background: #f5f5f5; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; }
        .test-section { margin: 20px 0; padding: 15px; border-left: 4px solid #007bff; background: #f8f9fa; }
        .success { border-color: #28a745; }
        .error { border-color: #dc3545; }
        button { background: #007bff; color: white; border: none; padding: 10px 15px; border-radius: 4px; cursor: pointer; margin: 5px; }
        button:hover { background: #0056b3; }
        .status { padding: 10px; margin: 10px 0; border-radius: 4px; }
        .online { background: #d4edda; border: 1px solid #c3e6cb; }
        .offline { background: #f8d7da; border: 1px solid #f5c6cb; }
        pre { background: #f1f1f1; padding: 10px; border-radius: 4px; overflow-x: auto; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧪 Test - Système de Pointage Offline</h1>

        <div class="status" id="connectionStatus">
            <strong>Statut connexion :</strong> <span id="statusText">Vérification...</span>
        </div>

        <div class="test-section">
            <h3>1. Test de Base</h3>
            <button onclick="testIndexedDB()">Tester IndexedDB</button>
            <button onclick="testServiceWorker()">Tester Service Worker</button>
            <button onclick="testLocalStorage()">Tester LocalStorage</button>
            <div id="basicTests"></div>
        </div>

        <div class="test-section">
            <h3>2. Test Fonctionnel Offline</h3>
            <button onclick="simulateOffline()">Simuler Mode Offline</button>
            <button onclick="simulateOnline()">Simuler Mode Online</button>
            <button onclick="testOfflinePointage()">Test Pointage Offline</button>
            <div id="offlineTests"></div>
        </div>

        <div class="test-section">
            <h3>3. Test Interface Pointage</h3>
            <button onclick="testPointageInterface()">Test Interface</button>
            <button onclick="clearOfflineData()">Vider Cache</button>
            <div id="interfaceTests"></div>
        </div>

        <div class="test-section">
            <h3>4. Statistiques Cache</h3>
            <button onclick="getStorageStats()">Afficher Stats</button>
            <div id="storageStats"></div>
        </div>
    </div>

    <script>
        // Détection du statut réseau
        function updateConnectionStatus() {
            const status = document.getElementById('connectionStatus');
            const text = document.getElementById('statusText');

            if (navigator.onLine) {
                text.textContent = '✅ En ligne';
                status.className = 'status online';
            } else {
                text.textContent = '❌ Hors ligne';
                status.className = 'status offline';
            }
        }

        // Test IndexedDB
        async function testIndexedDB() {
            const resultDiv = document.getElementById('basicTests');
            try {
                const request = indexedDB.open('TestDB', 1);
                request.onsuccess = () => {
                    resultDiv.innerHTML += '<p>✅ IndexedDB disponible et fonctionnel</p>';
                    request.result.close();
                };
                request.onerror = () => {
                    resultDiv.innerHTML += '<p>❌ Erreur IndexedDB: ' + request.error + '</p>';
                };
            } catch (error) {
                resultDiv.innerHTML += '<p>❌ IndexedDB non supporté: ' + error.message + '</p>';
            }
        }

        // Test Service Worker
        async function testServiceWorker() {
            const resultDiv = document.getElementById('basicTests');
            if ('serviceWorker' in navigator) {
                try {
                    const registration = await navigator.serviceWorker.getRegistration();
                    if (registration) {
                        resultDiv.innerHTML += '<p>✅ Service Worker enregistré: ' + registration.scope + '</p>';
                    } else {
                        resultDiv.innerHTML += '<p>⚠️ Service Worker non enregistré</p>';
                    }
                } catch (error) {
                    resultDiv.innerHTML += '<p>❌ Erreur Service Worker: ' + error.message + '</p>';
                }
            } else {
                resultDiv.innerHTML += '<p>❌ Service Worker non supporté</p>';
            }
        }

        // Test LocalStorage
        function testLocalStorage() {
            const resultDiv = document.getElementById('basicTests');
            try {
                localStorage.setItem('test', 'ok');
                const value = localStorage.getItem('test');
                localStorage.removeItem('test');

                if (value === 'ok') {
                    resultDiv.innerHTML += '<p>✅ LocalStorage fonctionnel</p>';
                } else {
                    resultDiv.innerHTML += '<p>❌ LocalStorage défaillant</p>';
                }
            } catch (error) {
                resultDiv.innerHTML += '<p>❌ LocalStorage non disponible: ' + error.message + '</p>';
            }
        }

        // Simulation mode offline
        function simulateOffline() {
            const resultDiv = document.getElementById('offlineTests');
            resultDiv.innerHTML += '<p>📱 Mode offline simulé (window.navigator.onLine = false)</p>';

            // Note: La vraie simulation nécessiterait la désactivation du réseau
            resultDiv.innerHTML += '<p>ℹ️ Pour un test complet, désactivez votre connexion internet</p>';
        }

        // Simulation mode online
        function simulateOnline() {
            const resultDiv = document.getElementById('offlineTests');
            resultDiv.innerHTML += '<p>🌐 Mode online simulé (window.navigator.onLine = true)</p>';
        }

        // Test pointage offline
        async function testOfflinePointage() {
            const resultDiv = document.getElementById('offlineTests');

            // Test de données factices
            const testPointage = {
                agent_id: 1,
                date_pointage: new Date().toISOString().split('T')[0],
                present: true,
                heure_arrivee: '08:00',
                heure_depart: '17:00',
                commentaire: 'Test offline',
                department_id: 1,
                created_by: 1
            };

            resultDiv.innerHTML += '<pre>📝 Test pointage:\n' + JSON.stringify(testPointage, null, 2) + '</pre>';
            resultDiv.innerHTML += '<p>✅ Structure de données pointage validée</p>';
        }

        // Test interface
        function testPointageInterface() {
            const resultDiv = document.getElementById('interfaceTests');
            resultDiv.innerHTML += '<p>🎯 Interface de pointage offline disponible à: <strong>/rh/pointages/create</strong></p>';
            resultDiv.innerHTML += '<p>📋 Fonctionnalités incluses:</p>';
            resultDiv.innerHTML += '<ul>' +
                '<li>✅ Indicateurs de statut réseau</li>' +
                '<li>✅ Cache intelligent des départements/agents</li>' +
                '<li>✅ Sauvegarde locale des pointages</li>' +
                '<li>✅ Synchronisation automatique</li>' +
                '<li>✅ Panneau de gestion offline</li>' +
                '</ul>';
        }

        // Vider le cache
        function clearOfflineData() {
            const resultDiv = document.getElementById('interfaceTests');
            try {
                localStorage.clear();
                sessionStorage.clear();
                resultDiv.innerHTML += '<p>🧹 Cache localStorage/sessionStorage vidé</p>';

                // Suggestion pour IndexedDB
                resultDiv.innerHTML += '<p>ℹ️ Pour vider IndexedDB, utilisez les DevTools → Application → Storage</p>';
            } catch (error) {
                resultDiv.innerHTML += '<p>❌ Erreur lors du nettoyage: ' + error.message + '</p>';
            }
        }

        // Statistiques stockage
        async function getStorageStats() {
            const resultDiv = document.getElementById('storageStats');

            try {
                if ('storage' in navigator && 'estimate' in navigator.storage) {
                    const estimate = await navigator.storage.estimate();
                    const used = (estimate.usage / 1024 / 1024).toFixed(2);
                    const quota = (estimate.quota / 1024 / 1024).toFixed(0);

                    resultDiv.innerHTML = '<pre>📊 Statistiques de stockage:\n' +
                        'Utilisé: ' + used + ' MB\n' +
                        'Quota: ' + quota + ' MB\n' +
                        'Disponible: ' + (quota - used).toFixed(2) + ' MB</pre>';
                } else {
                    resultDiv.innerHTML = '<p>❌ Storage API non disponible</p>';
                }
            } catch (error) {
                resultDiv.innerHTML = '<p>❌ Erreur stats: ' + error.message + '</p>';
            }
        }

        // Initialisation
        document.addEventListener('DOMContentLoaded', () => {
            updateConnectionStatus();

            // Écouter les changements de connexion
            window.addEventListener('online', updateConnectionStatus);
            window.addEventListener('offline', updateConnectionStatus);
        });
    </script>
</body>
</html>
